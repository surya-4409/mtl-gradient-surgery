services:
  streamlit-app:
    build: .
    container_name: mtl_dashboard
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - STREAMLIT_SERVER_PORT=8501
      # Force headless mode to prevent interactive terminal prompts
      - STREAMLIT_SERVER_HEADLESS=true
      # Ensure it binds to the Docker network, not just internal localhost
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      # Disable the usage stats prompt entirely
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    env_file:
      - .env.example